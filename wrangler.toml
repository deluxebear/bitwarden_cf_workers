name = "bitwarden-workers"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
JWT_SECRET = "change-me-in-production"
JWT_EXPIRATION = "3600"
JWT_REFRESH_EXPIRATION = "2592000"
GLOBAL_PREMIUM = "true"
ICONS_CACHE_SUCCESS_TTL_SECONDS = "1209600"
ICONS_CACHE_NEGATIVE_TTL_SECONDS = "43200"
ICONS_MAX_IMAGE_BYTES = "51200"
# 邀请链接中的 Web Vault 地址，例如 https://vault.example.com 或 http://localhost:8080（本地开发）
# VAULT_BASE_URL = "http://localhost:8080"
# 设为 "true" 时，邀请链接一律进入「注册」页，被邀请人需设置主密钥（适合自建、该邮箱尚未注册或希望走注册流程）
# FORCE_INVITE_REGISTER = "true"
# 控制开放注册行为: "true" 始终允许 | "false" 始终禁止 | "auto" 无用户时允许，有用户后关闭（默认）
SIGNUPS_ALLOWED = "true"
# 本地开发默认：邮件 token 写入 wrangler 日志，并在响应中回显，便于 Web 注册/邮箱变更手测。
# 生产应改为 EMAIL_MODE="provider" 并移除 EMAIL_RETURN_TOKENS。
EMAIL_MODE = "log"
EMAIL_RETURN_TOKENS = "true"

[[d1_databases]]
binding = "DB"
database_name = "bitwarden-db"
database_id = "local"
migrations_dir = "drizzle"

[dev]
port = 8787

[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "bitwarden-attachments"

[[kv_namespaces]]
binding = "ICONS_CACHE"
id = "local-icons-cache"
preview_id = "local-icons-cache"

# Durable Objects - 实时通知 (SignalR 兼容 WebSocket Hub)
# 对应官方 Notifications/NotificationsHub.cs
[durable_objects]
bindings = [
  { name = "NOTIFICATION_HUB", class_name = "NotificationHub" },
]

[[migrations]]
tag = "v1"
new_classes = ["NotificationHub"]

# 定时任务 - Cron Triggers
# 对应官方 Admin/JobsHostedService.cs + Api/JobsHostedService.cs
[triggers]
crons = [
  "*/5 * * * *",   # 每5分钟 - 删除到期 Send (DeleteSendsJob)
  "0 0 * * *",     # 每日午夜UTC - 永久删除30天前软删除 Cipher (DeleteCiphersJob)
  "0 22 * * 5",    # 每周五22点UTC - 清理过期 Refresh Token (DatabaseExpiredGrantsJob)
]
